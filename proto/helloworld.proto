syntax = "proto3";

package helloworld;

// The canonical gRPC example service. Used by the build pipeline and the
// interop tests. Covers unary plus the three streaming shapes.
service Greeter {
  // Unary.
  rpc SayHello (HelloRequest) returns (HelloReply);
  // Server-streaming.
  rpc SayHelloStream (HelloRequest) returns (stream HelloReply);
  // Client-streaming.
  rpc SayHelloCollect (stream HelloRequest) returns (HelloReply);
  // Bidirectional streaming.
  rpc SayHelloChat (stream HelloRequest) returns (stream HelloReply);
}

message HelloRequest {
  string name = 1;
}

message HelloReply {
  string message = 1;
}
